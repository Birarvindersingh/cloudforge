name: Deploy CloudForge

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6.0.2

            - name: Deploy to EC2
              uses: appleboy/ssh-action@v1.2.5
              with:
                host: ${{ secrets.SERVER_IP }}
                username: ubuntu
                key: ${{ secrets.SSH_KEY }}
                script: |
                  if [ ! -d "cloudforge" ]; then
                    git clone https://github.com/Birarvindersingh/cloudforge.git
                  fi

                  cd cloudforge
                  git pull

                  pip3 install -r requirements.txt

                  pkill -f uvicorn || true

                  nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > log.txt 2>&1 &