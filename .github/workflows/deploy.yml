name: Deploy CloudForge

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 10m
          script: |
            if [ ! -d "cloudforge" ]; then
              git clone https://github.com/Birarvindersingh/cloudforge.git
            fi

              cd cloudforge
              git pull

              source venv/bin/activate

              pip install -r requirements.txt --no-cache-dir

              echo "Stopping old server..."
              pkill -f "uvicorn app.main:app" || echo "No server running"
              sleep 2

              echo "Starting new server..."
              nohup venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 > log.txt 2>&1 < /dev/null &
              disown

              echo "Deployment successful"